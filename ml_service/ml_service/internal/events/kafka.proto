syntax = "proto3";

option go_package = "internal/generated/dbus/consume/uziprocessed";

message UziSplitted {
    string uzi_id = 100;
    repeated string pages_id = 200;
}

message UziProcessed {
    // из-за коллизии имен с grpc, пришлось использовать вложенные сообщения
    message Node {
        bool ai = 100;
        double tirads_23 = 400;
        double tirads_4 = 500;
        double tirads_5 = 600;
    }

    message Segment {
        string image_id = 100;
        bytes contor = 200;
        double tirads_23 = 300;
        double tirads_4 = 400;
        double tirads_5 = 500;
    }

    message NodeWithSegments {
        Node node = 100;
        repeated Segment segments = 200;
    }

    string uzi_id = 100;
    repeated NodeWithSegments nodes_with_segments = 200;
}

message CytologySplitted {
    string cytology_id = 100;
    string original_image_id = 200;
}

message CytologyProcessed {
    string cytology_id = 100;
    string original_image_id = 200;
    FeatureCollection geojson_features = 300;
}

message FeatureCollection {
    repeated Feature features = 100;
}

message Feature {
    Geometry geometry = 100;
    Properties properties = 200;
}

message Geometry {
    oneof geometry_type {
        Point point = 100;
        Polygon polygon = 200;
    }
}

message Point {
    double x = 100;
    double y = 200;
}

message Polygon {
    repeated Ring rings = 100;
}

message Ring {
    repeated Point points = 100;
}

message Properties {
    Classification classification = 100;
    bool is_locked = 200;
}

message Classification {
    string name = 100;
    Color color = 200;
}

message Color {
    int32 r = 100;
    int32 g = 200;
    int32 b = 300;
}
